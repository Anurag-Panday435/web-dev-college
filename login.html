<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Form</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f4f4f4;
        }

        .form-card{
            width:350px;
            background:white;
            padding:30px;
            border-radius:14px;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#0e69d1;
        }

        .form-group{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:5px;
            font-size:14px;
            color:#0c55a3;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:14px;
            outline:none;
            font-size:15px;
        }

        input:focus{
            border-color:#007bff;
        }

        button{
            width:100%;
            padding:14px;
            margin-top:15px;
    border:none;
    border-radius:14px;
            background:#007bff;
            color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
        }

        
          #removeBtn{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#ff4d4d,#cc0000);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

#removeBtn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(255,0,0,0.3);
}

        button:hover{
            background:#0056b3;
        }

        .output{
            margin-top:20px;
            padding:10px;
            background:#f1f1f1;
            border-radius:5px;
            font-size:14px;
        }

    </style>
</head>

<body>

    <div class="form-card">

        <h2>Create Account</h2>

        <form id="formData">

            <div class="form-group">
                <label>Name</label>
                <input type="text" id="signup-name" placeholder="Enter Name" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signup-email" placeholder="Enter Email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signup-password" placeholder="Enter Password" required>
            </div>

            <button type="submit">Create Account</button>

        </form>

        <div class="output" id="showData">
            No Data Stored
        </div>
        <button id="removeBtn">Remove</button>

    </div>


<script src="login.js">


</script>

</body>
</html>
