<!-- cart.html -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f4f4;
    min-height:100vh;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:30px;
    color:#222;
}

#show{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:25px;
}

.card{
    width:260px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    transition:0.3s ease;
    text-align:center;
    padding:18px;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:15px;
    margin-bottom:15px;
}

.card h2{
    font-size:20px;
    color:#222;
    margin-bottom:10px;
}

.card h3{
    color:#ff6b00;
    margin-bottom:15px;
    font-size:22px;
}

button{
    border:none;
    background:red;
    color:white;
    padding:10px 20px;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
}

.empty{
    text-align:center;
    font-size:22px;
    margin-top:100px;
    color:gray;
}

</style>
</head>

<body>

<h1>My Cart</h1>

<div id="show"></div>

<script>

let cartData = JSON.parse(localStorage.getItem("item")) || [];

let show = document.getElementById("show");


if(cartData.length == 0){

    show.innerHTML = `
    
    <div class="empty">
        Cart is Empty
    </div>
    
    `;
}


function displayCart(){

    show.innerHTML = "";

    cartData.map((a,index)=>{

        show.innerHTML += `

        <div class="card">

            <img src="${a.thumbnail}">

            <h2>${a.title}</h2>

            <h3>$${a.price}</h3>

            <button onclick="removeItem(${index})">
                Remove
            </button>

        </div>

        `;
    })
}


displayCart();



function removeItem(index){

    cartData.splice(index,1);

    localStorage.setItem("item", JSON.stringify(cartData));

    displayCart();

    if(cartData.length == 0){

        show.innerHTML = `
        
        <div class="empty">
            Cart is Empty
        </div>
        
        `;
    }
}

</script>

</body>
</html>
