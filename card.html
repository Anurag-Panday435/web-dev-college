<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:25px;
    padding:100px 25px 30px;
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f4f4;
    min-height:100vh;
}

#show{
    width:100%;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:25px;
}

.card{
    width:260px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    transition:0.3s ease;
    text-align:center;
    padding:18px;
}

.card:hover{
    transform:translateY(-8px) scale(1.02);
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:15px;
    margin-bottom:15px;
}

.card h2{
    font-size:20px;
    color:#222;
    margin-bottom:10px;
}

.card h3{
    color:#ff6b00;
    margin-bottom:15px;
    font-size:22px;
}

button{
    border:none;
    background:linear-gradient(45deg,#ff6b00,#ff9500);
    color:white;
    padding:10px 22px;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.cartBtn{
    position:fixed;
    top:20px;
    right:20px;
    z-index:1000;
}

.cartBtn button{
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    padding:12px 24px;
    border-radius:50px;
}

</style>
</head>

<body>

<a href="addToCart.html" class="cartBtn">
    <button>Go To Cart</button>
</a>

<div id="show"></div>

<script>

fetch("https://dummyjson.com/products")
.then((res)=>{
    return res.json();
})
.then((data)=>{

    let show = document.getElementById("show");

    window.allProducts = data.products;

    data.products.map((a)=>{

        show.innerHTML += `

        <div class="card">

            <img src="${a.thumbnail}">

            <h2>${a.title}</h2>

            <h3>$${a.price}</h3>

            <button onclick="addToCart(${a.id})">
                Add To Cart
            </button>

        </div>

        `;
    })
})



let cart = JSON.parse(localStorage.getItem("item")) || [];


function addToCart(id){

    let product = window.allProducts.find((a)=>{
        return a.id == id;
    })

    cart.push(product);

    localStorage.setItem("item", JSON.stringify(cart));

    alert("Product Added Successfully");
}

</script>

</body>
</html>
