
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Quiz App</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#667eea,#764ba2);
  overflow:hidden;
}

/* Animated Background */
body::before{
  content:'';
  position:absolute;
  width:300px;
  height:300px;
  background:rgba(255,255,255,0.15);
  border-radius:50%;
  top:-80px;
  left:-80px;
}

body::after{
  content:'';
  position:absolute;
  width:250px;
  height:250px;
  background:rgba(255,255,255,0.1);
  border-radius:50%;
  bottom:-80px;
  right:-80px;
}

.quiz-container{
  width:100%;
  max-width:600px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:20px;
  padding:30px;
  color:white;
  box-shadow:0 10px 40px rgba(0,0,0,0.3);
  z-index:10;
}

h1{
  text-align:center;
  margin-bottom:20px;
  font-size:32px;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
  font-weight:bold;
}

.progress-container{
  width:100%;
  height:10px;
  background:rgba(255,255,255,0.2);
  border-radius:20px;
  margin-bottom:25px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  background:#00ffcc;
  transition:0.4s;
}

.question{
  font-size:22px;
  margin-bottom:25px;
  line-height:1.5;
}

.options{
  display:flex;
  flex-direction:column;
  gap:15px;
}

.option{
  padding:15px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.15);
  color:white;
  cursor:pointer;
  transition:0.3s;
  font-size:16px;
  border:2px solid transparent;
}

.option:hover{
  transform:translateX(5px);
  background:rgba(255,255,255,0.25);
}

.correct{
  background:#2ecc71 !important;
}

.wrong{
  background:#e74c3c !important;
}

#nextBtn{
  margin-top:25px;
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#00c9a7;
  color:white;
  font-size:17px;
  cursor:pointer;
  transition:0.3s;
  font-weight:bold;
}

#nextBtn:hover{
  background:#00a98d;
}

#nextBtn:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

.timer{
  color:#ffe600;
}

.result{
  text-align:center;
}

.result h2{
  font-size:35px;
  margin-bottom:15px;
}

.final-score{
  font-size:55px;
  margin:20px 0;
  color:#00ffcc;
}

#restartBtn{
  padding:15px 30px;
  border:none;
  border-radius:12px;
  background:#ff9800;
  color:white;
  font-size:18px;
  cursor:pointer;
  margin-top:20px;
}

#restartBtn:hover{
  background:#e68900;
}

.hide{
  display:none;
}

</style>
</head>
<body>

<div class="quiz-container">

  <h1>🧠 Quiz Master</h1>

  <!-- Quiz Screen -->
  <div id="quizScreen">

    <div class="top-bar">
      <span>⭐ Score: <span id="score">0</span></span>
      <span class="timer">⏱ <span id="timer">15</span>s</span>
    </div>

    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <p id="questionNum"></p>

    <div class="question" id="question"></div>

    <div class="options" id="options"></div>

    <button id="nextBtn" onclick="nextQuestion()" disabled>
      Next Question →
    </button>

  </div>

  <!-- Result Screen -->
  <div id="resultScreen" class="result hide">

    <h2>🎉 Quiz Complete!</h2>

    <div class="final-score" id="finalScore"></div>

    <p id="resultMsg"></p>

    <button id="restartBtn" onclick="restartQuiz()">
      Play Again
    </button>

  </div>

</div>

<script>

const questions = [

{
question:"HTML ka full form kya hai?",
options:[
"Hyper Text Markup Language",
"High Text Machine Language",
"Hyper Tool Multi Language",
"None"
],
answer:0
},

{
question:"CSS kis kaam aata hai?",
options:[
"Styling",
"Database",
"Backend",
"Server"
],
answer:0
},

{
question:"JavaScript ka use hota hai?",
options:[
"Interactivity",
"Cooking",
"Painting",
"Gaming Console"
],
answer:0
},

{
question:"Kaunsa tag image show karta hai?",
options:[
"<img>",
"<image>",
"<src>",
"<pic>"
],
answer:0
},

{
question:"Array ki length kaise check karte hain?",
options:[
"array.size",
"array.length",
"length(array)",
"count()"
],
answer:1
}

];

let currentQuestion = 0;
let score = 0;
let timeLeft = 15;
let timer;
let answered = false;

window.onload = () =>{
  loadQuestion();
}

function loadQuestion(){

  answered = false;
  timeLeft = 15;

  document.getElementById('timer').textContent = timeLeft;

  const q = questions[currentQuestion];

  document.getElementById('questionNum').textContent =
  `Question ${currentQuestion + 1} / ${questions.length}`;

  document.getElementById('question').textContent = q.question;

  const optionsDiv = document.getElementById('options');

  optionsDiv.innerHTML = '';

  q.options.forEach((option,index)=>{

    const btn = document.createElement('button');

    btn.classList.add('option');

    btn.textContent = option;

    btn.onclick = ()=> checkAnswer(index,btn);

    optionsDiv.appendChild(btn);

  });

  document.getElementById('nextBtn').disabled = true;

  updateProgress();

  startTimer();
}

function startTimer(){

  clearInterval(timer);

  timer = setInterval(()=>{

    timeLeft--;

    document.getElementById('timer').textContent = timeLeft;

    if(timeLeft <= 0){

      clearInterval(timer);

      timeUp();
    }

  },1000);
}

function checkAnswer(selected,btn){

  if(answered) return;

  answered = true;

  clearInterval(timer);

  const correct = questions[currentQuestion].answer;

  const allOptions = document.querySelectorAll('.option');

  allOptions.forEach(option=>{
    option.disabled = true;
  });

  if(selected === correct){

    btn.classList.add('correct');

    score++;

    document.getElementById('score').textContent = score;

  }else{

    btn.classList.add('wrong');

    allOptions[correct].classList.add('correct');
  }

  document.getElementById('nextBtn').disabled = false;

  setTimeout(()=>{
    nextQuestion();
  },1500);
}

function timeUp(){

  answered = true;

  const correct = questions[currentQuestion].answer;

  const allOptions = document.querySelectorAll('.option');

  allOptions.forEach(option=>{
    option.disabled = true;
  });

  allOptions[correct].classList.add('correct');

  document.getElementById('nextBtn').disabled = false;

  setTimeout(()=>{
    nextQuestion();
  },1500);
}

function nextQuestion(){

  currentQuestion++;

  if(currentQuestion < questions.length){

    loadQuestion();

  }else{

    showResult();
  }
}

function updateProgress(){

  const progress =
  ((currentQuestion) / questions.length) * 100;

  document.getElementById('progressBar').style.width =
  progress + '%';
}

function showResult(){

  document.getElementById('quizScreen')
  .classList.add('hide');

  document.getElementById('resultScreen')
  .classList.remove('hide');

  document.getElementById('finalScore')
  .textContent =
  `${score} / ${questions.length}`;

  let msg = '';

  if(score === questions.length){

    msg = "🏆 Perfect! You are Genius!";

  }else if(score >= 3){

    msg = "🔥 Great Job!";

  }else{

    msg = "📚 Keep Practicing!";
  }

  document.getElementById('resultMsg').textContent = msg;
}

function restartQuiz(){

  currentQuestion = 0;

  score = 0;

  document.getElementById('score').textContent = 0;

  document.getElementById('resultScreen')
  .classList.add('hide');

  document.getElementById('quizScreen')
  .classList.remove('hide');

  loadQuestion();
}

</script>

</body>
</html>
```
